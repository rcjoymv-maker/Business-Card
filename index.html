<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Business Card - Dark Theme</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">

        <!-- ===== Front Card ===== -->
        <div class="card">
            <div class="overlay"></div>

            <!-- Profile Image (front card) -->
            <img src="Tim_Cook_10723_01_0014.webp" alt="Tim Cook Profile Image" />

            <!-- Main Info -->
            <div class="content">
                <h2 class="name">TIM COOK</h2>
                <p class="title">Chief Executive Officer</p>

                <!-- Extra details -->
                <p class="company">Apple Inc.</p>
                <p class="tagline">Leading innovation and design worldwide</p>
            </div>
        </div>

        <!-- ===== Back Card ===== -->
        <div class="card-back">
            <div class="overlay"></div>

            <!-- Back card image -->
            <img src="Tim-Cook-Apple-Inc-CEO-2025.webp" alt="Tim Cook Back Image" class="back-image" />

            <!-- Contact Info -->
            <div class="contact">
                <p><strong>Phone:</strong> +1 408 996 1010</p>
                <p><strong>Email:</strong> tim.cook@apple.com</p>
                <p><strong>Website:</strong> www.apple.com</p>
                <p><strong>Address:</strong> One Apple Park Way, Cupertino, CA, USA</p>
            </div>

            <!-- Social Links -->
            <div class="social">
                <p><strong>Follow:</strong></p>
                <p>🌐 Website</p>
                <p>🔗 LinkedIn</p>
                <p>🐦 Twitter</p>
            </div>
        </div>

    </div>
</body>

</html>
